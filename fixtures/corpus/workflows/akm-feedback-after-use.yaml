id: akm-feedback-after-use
title: "Agent records feedback after using an AKM asset"
description: |
  After akm show + a successful task, the AKM-armed agent should record
  positive feedback so utility scoring can converge.
applies_to:
  arms: ["akm"]
  outcomes: ["pass"]
required_sequence:
  - event: agent_started
  - event: akm_show
    before: verifier_run
  - event: verifier_run
    before: akm_feedback
  - event: akm_feedback
    polarity: positive
    before: agent_finished
  - event: agent_finished
forbidden:
  - event: akm_feedback
    before: verifier_run
scoring:
  required_steps_weight: 0.5
  forbidden_steps_weight: 0.2
  evidence_quality_weight: 0.3
