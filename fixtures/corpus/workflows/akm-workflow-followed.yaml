id: akm-workflow-followed
title: "Agent uses akm workflow to execute a step-by-step task"
description: |
  When a task provides a workflow asset in the stash, the AKM-armed agent
  must start the workflow run with akm workflow start (or next), complete
  at least one step with akm workflow complete, and not bypass the workflow
  by writing directly without consulting it.
applies_to:
  arms: ["akm"]
  task_domains: ["workflow-compliance", "inkwell"]
required_sequence:
  - event: agent_started
  - event: akm_search
    before: akm_workflow_start
  - event: akm_workflow_start
    before: first_workspace_write
  - event: akm_workflow_complete
    before: agent_finished
  - event: agent_finished
forbidden:
  - event: first_workspace_write
    before: akm_workflow_start
scoring:
  required_steps_weight: 0.6
  forbidden_steps_weight: 0.3
  evidence_quality_weight: 0.1
